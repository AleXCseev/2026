<section class="order__section">
  <div class="container">
    <div class="order__section-wrapper" id="order">
      <div class="order__content">
        <h2 class="order__title">Замовляйте зараз — і наведіть порядок без зайвих зусиль</h2>
        <div class="order__wrapper">
          <div class="header__tag">
            <span>акційна ціна</span>
          </div>
          <div class="order__price">
            <div class="price">
              <span class="old__price"> 3180 грн </span>
              <span class="new__price"> 1590 грн </span>
            </div>
          </div>
          <form class="order__form">
            <div class="input__wrapper">
              <label for="name">Введіть ваше ім'я*</label>
              <input id="name" type="text" placeholder="Ваше ім'я" required />
            </div>
            <div class="input__wrapper">
              <label for="phone">Введіть свій номер телефона*</label>
              <input id="phone" type="tel" placeholder="+380" required />
            </div>
            <button type="submit" class="order__btn order__submit">
              <span>Замовити зараз зі знижкою</span>
            </button>
          </form>
          <p class="order__info">
            - Все необхідне вже в комплекті <br />
            - Оплата при отриманні <br />
            - Швидка відправка по Україні
          </p>
        </div>
      </div>
    </div>
  </div>
</section>

<div class="order__line">
  <div class="container">
    <div class="order__line-wrapper">
      <div class="order__items">
        <div class="order__item">
          <img src="img/order-icon-1.png" alt="" class="order__item-icon" />
          <p class="order__item-text">Без передплати</p>
        </div>
        <div class="order__item">
          <img src="img/order-icon-2.png" alt="" class="order__item-icon" />
          <p class="order__item-text">відправка 1-2 дні</p>
        </div>
        <div class="order__item">
          <img src="img/order-icon-3.png" alt="" class="order__item-icon" />
          <p class="order__item-text">огляд на пошті</p>
        </div>
      </div>
    </div>
  </div>
</div>
