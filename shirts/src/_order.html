<section class="order__section" id="order">
  <div class="container">
    <div class="order__section-wrapper">
      <div class="order">
        <form action="" class="order__form">
          <h3 class="order__title">Посадка</h3>
          <div class="order__type">
            <button data-type="Чоловіча" type="button" class="order__btn-type active">Чоловіча</button>
            <button data-type="Жіноча" type="button" class="order__btn-type">Жіноча</button>
          </div>
          <h3 class="order__title">Розмір</h3>
          <div class="order__size">
            <button data-size="S" type="button" class="order__btn-size">S</button>
            <button data-size="M" type="button" class="order__btn-size active">M</button>
            <button data-size="L" type="button" class="order__btn-size">L</button>
            <button data-size="XL" type="button" class="order__btn-size">XL</button>
            <button data-size="XXL" type="button" class="order__btn-size">XXL</button>
          </div>
          <div class="order__price price">
            <p class="new__price">690 <span class="new__price-currency">грн</span></p>
            <span class="old__price"> 1090 грн </span>
          </div>
          <div class="input__wrapper">
            <input type="text" placeholder="Ваше ім'я" required />
          </div>
          <div class="input__wrapper">
            <input type="tel" placeholder="Номер телефон" required />
          </div>
          <button type="submit" class="order__btn order__submit">
            <span>ЗАМОВИТИ ЗАРАЗ</span>
            <img src="img/header-arrow.png" alt="" />
          </button>
          <div class="header__info">
            <div class="header__rating">
              <div class="rating">
                <img src="img/star-alt.png" alt="" />
                <img src="img/star-alt.png" alt="" />
                <img src="img/star-alt.png" alt="" />
                <img src="img/star-alt.png" alt="" />
                <img src="img/star-alt.png" alt="" />
              </div>
              <p class="header__info-text">4.85</p>
            </div>
            <p class="header__info-text">958+ замовлень</p>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
