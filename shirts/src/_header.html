<header class="header__section">
  <div class="container">
    <div class="header__section-wrapper">
      <h1 class="header__title">
        БАЗА <br />
        <span>НА КОЖЕН ДЕНЬ</span>

      <p class="header__text">
        чорна + біла футболки <br />

      </p>
      <div class="header__tag">
        <img src="img/header-icon-1.png" alt="" />

      </div>

      <div class="header__price price">
        <p class="new__price">690 <span class="new__price-currency">грн</span></p>

      <a href="#order" class="order__btn">

                <img src="img/star.png" alt="">
                <img src="img/star.png" alt="">

      <div class="header__items">
        <div class="header__item">
            <img src="img/header-icon-2.png" alt="">
            <p class="header__item-text">
                Не просвічується
            </p>
        </div>
         <div class="header__item">
            <img src="img/header-icon-3.png" alt="">
            <p class="header__item-text">
                Тримає форму
            </p>
        </div>
         <div class="header__item">
            <img src="img/header-icon-4.png" alt="">

            </p>

      </div>
