<section class="order section" id="order">
  <header class="header__section">
    <div class="container">
      <div class="header__section-wrapper">
        <button type="button" data-id="home" class="header__title nav__trigger">
          <img src="img/left-arrow.png" alt="" /> Glucoactive
        </button>
      </div>
    </div>
  </header>
  <img src="img/reels/8.png" alt="" class="order__prod" />
  <div class="order__info">
    <div class="container">
      <div class="order__info-wrapper">
        <h3>ग्लूकोएक्टिव</h3>
        <p>आयुर्वेदिक कॉम्प्लेक्स · शुगर को सामान्य बनाना · 60 कैप्सूल</p>
        <div class="order__info-rating">★★★★★ <span>4.9 · 9,841 समीक्षाएँ</span></div>
      </div>
    </div>
  </div>
  <form action="" class="order__form">
    <div class="container">
      <div class="order__form-wrapper">
        <h3 class="order__form-title">एक कोर्स चुनें</h3>
        <div class="order__form-btns">
          <button type="button" data-count="1" class="order__form-btn">
            <div class="order__btn-icon"></div>
            <div class="order__btn-body">
              <h3>1 पैकेज - कोर्स 30 दिन</h3>
              <div class="price">
                <span class="new__price"> ₹990 </span>
                <span class="old__price"> ₹1,980 </span>
              </div>
            </div>
          </button>
          <button type="button" data-count="1" class="order__form-btn active">
            <div class="order__btn-icon"></div>
            <div class="order__btn-body">
              <h3>2 पैक - कोर्स 60 दिन</h3>
              <div class="price">
                <span class="new__price"> ₹1,780 </span>
                <span class="old__price"> ₹3,960 </span>
              </div>
            </div>
            <div class="order__btn-discount">-10%</div>
          </button>
          <button type="button" data-count="1" class="order__form-btn">
            <div class="order__btn-icon"></div>
            <div class="order__btn-body">
              <h3>3 पैक - कोर्स 90 दिन</h3>
              <div class="price">
                <span class="new__price"> ₹2,490 </span>
                <span class="old__price"> ₹5,940 </span>
              </div>
            </div>
            <div class="order__btn-discount">-15%</div>
          </button>
        </div>
        <div class="order__form-info-items">
          <p class="order__form-info">📦 मुफ़्त गुमनाम डिलीवरी</p>
          <p class="order__form-info">💳 रसीद पर भुगतान - कोई जोखिम नहीं</p>
          <p class="order__form-info">🔄 बिना किसी प्रश्न के वापसी - 30 दिन</p>
          <p class="order__form-info">✅ आयुष जीएमपी प्रमाणपत्र</p>
        </div>
        <div class="input__wrapper">
          <label for="order-name">नाम</label>
          <input id="order-name" type="text" placeholder="अपना नाम दर्ज करें" required />
        </div>
        <div class="input__wrapper">
          <label for="order-phone">टेलीफ़ोन</label>
          <input id="order-phone" type="tel" placeholder="+91 ___-____-____" required />
        </div>
        <button type="submit" class="order__btn order__submit">50% छूट के साथ ऑर्डर करें</button>
      </div>
    </div>
  </form>
</section>
