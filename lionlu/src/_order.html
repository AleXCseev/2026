<section class="order__section">
  <div class="container">
    <div class="order__section-wrapper">
      <div class="order" id="order">
        <form action="" class="order__form">
          <h2 class="order__title">оформити замовлення</h2>
          <h3 class="order__subtitle">Персональна інформація</h3>
          <div class="inputs">
            <div class="input__wrapper">
              <input id="name" type="text" placeholder="" required />
              <label for="name"> Ваше ім`я </label>
            </div>
            <div class="input__wrapper">
              <input id="phone" type="tel" placeholder="" required />
              <label for="phone"> Номер телефону </label>
            </div>
          </div>
          <div class="inputs">
            <div class="color__block">
              <p class="color__size-text">колір</p>
              <div class="color"></div>
            </div>
            <div class="size__block">
              <p class="color__size-text">Розмір</p>
              <div class="size__btns">
                <button type="button" class="size__btn">40</button>
                <button type="button" class="size__btn">41</button>
                <button type="button" class="size__btn active">42</button>
                <button type="button" class="size__btn">43</button>
                <button type="button" class="size__btn">44</button>
              </div>
            </div>
          </div>
          <h3 class="order__subtitle">Вартість замовлення</h3>
          <div class="order__result">
            <p class="order__result-text">Загальна вартість замовлення</p>
            <span class="new__price">470 ₴</span>
          </div>
          <button type="submit" class="submit__btn">Оформити замовлення</button>
        </form>
      </div>
    </div>
  </div>
</section>
